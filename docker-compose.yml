version: '3.8'

services:
  umukomisiyoneri:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: umukomisiyoneri-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - umukomisiyoneri-network

  # Development service (optional)
  umukomisiyoneri-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: umukomisiyoneri-dev
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    networks:
      - umukomisiyoneri-network
    profiles:
      - dev

networks:
  umukomisiyoneri-network:
    driver: bridge
